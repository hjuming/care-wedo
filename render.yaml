services:
  - type: web
    name: care-wedo-mvp
    env: docker
    plan: free # 使用免費方案
    region: singapore # 離台灣最近的區域
    dockerContext: .
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_CONFIG
        value: prod
      - key: AUTO_CREATE_DB
        value: "true"
      - key: SECRET_KEY
        generateValue: true # 自動產生一個安全密鑰
      # 以下變數請在 Render 介面手動填入或在下方補齊
      - key: GOOGLE_API_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: care-wedo-db
          property: connectionString

databases:
  - name: care-wedo-db
    plan: free # 免費版 PostgreSQL (有效期限 90 天)
    region: singapore
