<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Care WEDO 醫療照護小管家 — AI 協助整理看診、用藥與健康提醒，讓家人安心陪伴。" />
    <title>Care WEDO — 醫療照護小管家</title>
    <style>
      /* Inline critical loading state so user sees something while JS loads */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #263128;
        background: linear-gradient(180deg, rgba(255,250,242,0.88), rgba(247,241,232,0.94)), #f7f1e8;
        text-align: center;
        padding: 20px;
      }
      .app-loading p { font-size: 18px; margin-top: 16px; color: #667066; }
      .app-loading .spinner {
        width: 40px; height: 40px;
        border: 4px solid #e2d8c8;
        border-top-color: #256f5b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Hide loading state once React mounts */
      #root:not(:empty) + .app-loading-fallback { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;padding:20px;text-align:center;background:#f7f1e8;">
        <h1 style="font-size:24px;margin-bottom:12px;">Care WEDO 需要 JavaScript</h1>
        <p style="color:#667066;">請在瀏覽器設定中啟用 JavaScript 後重新整理頁面。</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
