name: Daily Medical Reminders

on:
  workflow_dispatch: # Cloudflare Cron Worker is the production scheduler; this is manual backup only.

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    env:
      CRON_BASE_URL: https://care-wedo.pages.dev
    steps:
      - name: Trigger Care WEDO Reminders API
        run: |
          curl --fail-with-body --silent --show-error -X POST "$CRON_BASE_URL/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n"
