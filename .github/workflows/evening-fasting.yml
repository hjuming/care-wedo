name: Evening Fasting Reminders

on:
  schedule:
    # 每天 UTC 12:00 執行 (等於台灣時間晚上 20:00)
    - cron: '0 12 * * *'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  trigger-evening-reminders:
    runs-on: ubuntu-latest
    env:
      CRON_BASE_URL: https://care-wedo.pages.dev
    steps:
      - name: Trigger Care WEDO Evening API
        run: |
          curl --fail-with-body --silent --show-error -X POST "$CRON_BASE_URL/api/cron/evening" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n"
