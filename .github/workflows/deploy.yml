name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: care-wedo-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: care-wedo-app

      - name: Build
        run: npm run build
        working-directory: care-wedo-app
        env:
          VITE_LINE_LIFF_ID: ${{ secrets.VITE_LINE_LIFF_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy care-wedo-app/dist --project-name care-wedo --branch main
