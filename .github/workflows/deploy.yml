name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: care-wedo-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: care-wedo-app

      - name: Install root tooling (tsx for functions tests)
        run: npm ci

      # --- Quality gates: a failure here blocks the deploy below ---
      - name: Lint
        run: npm run lint
        working-directory: care-wedo-app

      - name: Lint CSS (stylelint)
        run: npm run lint:css
        working-directory: care-wedo-app

      - name: Test (frontend + regression)
        run: npm test
        working-directory: care-wedo-app
        env:
          # App logic and its date assertions operate in Asia/Taipei.
          # GitHub runners default to UTC, which shifts day boundaries.
          TZ: Asia/Taipei

      - name: Test (functions tenant-isolation)
        run: npm run test:functions
        env:
          TZ: Asia/Taipei

      - name: Typecheck (functions / scripts / workers)
        run: npm run typecheck

      - name: Validate env schema doc sync (.dev.vars.example)
        run: npm run env:check:example

      - name: Validate WCAG contrast (elder-friendly gate)
        run: npm run a11y:contrast

      - name: Validate Phase 59 RLS policy sync
        run: npm run rls:policy-sync

      - name: Validate real-receipt regression pack
        run: node scripts/validate-real-receipt-pack.mjs

      - name: Validate frontend public auth config
        run: node scripts/verify-vite-public-auth-config.mjs
        working-directory: care-wedo-app
        env:
          # Public client config is safe for the browser, but must be present at
          # build time. Prefer repository/environment Variables, then Secrets.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build
        run: npm run build
        working-directory: care-wedo-app
        env:
          # LIFF ID is a public value (not a secret), hardcoded here to ensure it's
          # always available during Vite build. Also matches wrangler.toml [vars].
          VITE_LINE_LIFF_ID: "2009972224-fQcfBXw5"
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        # Main pushes run quality gates only. Production deploys require an
        # explicit manual dispatch after product/security sign-off.
        if: github.event_name == 'workflow_dispatch'
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          npx wrangler@4 pages deploy care-wedo-app/dist \
            --project-name care-wedo \
            --branch main \
            --commit-message "deploy $SHORT_SHA"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
