name: Deploy Reminder Scheduler

on:
  push:
    branches: [main]
    paths:
      - "workers/reminder-scheduler/**"
      - ".github/workflows/deploy-reminder-scheduler.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root tooling
        run: npm ci

      - name: Install frontend test dependencies
        run: npm ci
        working-directory: care-wedo-app

      - name: Typecheck functions and scheduler worker
        run: npm run typecheck

      - name: Test functions
        run: npm run test:functions
        env:
          TZ: Asia/Taipei

      - name: Test scheduler regression coverage
        run: npm test
        working-directory: care-wedo-app
        env:
          TZ: Asia/Taipei

      - name: Deploy Cloudflare Cron Worker
        run: npx wrangler@4 deploy --config workers/reminder-scheduler/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync scheduler secret
        run: printf "%s" "$CRON_SECRET" | npx wrangler@4 secret put CRON_SECRET --config workers/reminder-scheduler/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
